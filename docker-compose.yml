services:
  mysql:
    image: mysql:8.4
    container_name: finregqa_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: finregqa
      MYSQL_USER: finregqa
      MYSQL_PASSWORD: finregqa_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finregqa_network

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: finregqa_etcd
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - finregqa_network

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: finregqa_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - finregqa_network

  milvus:
    image: milvusdb/milvus:v2.5.5
    container_name: finregqa_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 15
    networks:
      - finregqa_network

volumes:
  mysql_data:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  finregqa_network:
    driver: bridge
