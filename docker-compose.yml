version: '3.8'

services:
  # Milvus Standalone 向量数据库
  milvus:
    container_name: finregqa_milvus
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: "local"
    volumes:
      - milvus_data:/var/lib/milvus
      - milvus_etcd:/var/lib/milvus/etcd
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - finregqa_network

  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: finregqa_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-finregqa}
      MYSQL_USER: ${MYSQL_USER:-finregqa}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-finregqa_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - finregqa_network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

